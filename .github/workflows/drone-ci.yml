name: Drone Microservices CI/CD

# ========== 触发条件 ==========
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

# ========== 全局环境变量 ==========
env:
  REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
  NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}

jobs:
  # ============================================================
  # Job 1: 编译所有模块
  # ============================================================
  build-jars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Maven
        run: sudo apt-get update -qq && sudo apt-get install -y -qq maven

      - name: 验证环境
        run: |
          set -x
          java -version
          mvn --version
          ls -la
          ls -la backen/drone/
          test -f backen/drone/pom.xml && echo "pom.xml: FOUND" || echo "pom.xml: MISSING"

      - name: Maven 编译打包
        run: |
          set -eo pipefail
          cd backen/drone
          mvn clean package -DskipTests --batch-mode --errors --no-transfer-progress

      - name: 上传 jar 包
        uses: actions/upload-artifact@v4
        with:
          name: all-jars
          path: |
            backen/drone/drone-user-service/target/*.jar
            backen/drone/drone-news-service/target/*.jar
            backen/drone/drone-rank-service/target/*.jar
            backen/drone/drone-action-service/target/*.jar
            backen/drone/drone-gateway/target/*.jar
            backen/drone/drone-common/target/*.jar
          if-no-files-found: warn

  # ============================================================
  # Job 2: 构建并推送镜像（5 个服务并行）
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    needs: build-jars
    strategy:
      matrix:
        include:
          - service: user-service
            dockerfile: Dockerfile-user
          - service: news-service
            dockerfile: Dockerfile-news
          - service: rank-service
            dockerfile: Dockerfile-rank
          - service: action-service
            dockerfile: Dockerfile-action
          - service: gateway
            dockerfile: Dockerfile-gateway
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 下载 jar 包
        uses: actions/download-artifact@v4
        with:
          name: all-jars
          path: ./

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录阿里云 ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backen/drone
          file: ./backen/drone/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
