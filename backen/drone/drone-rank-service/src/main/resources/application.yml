server:
  port: 9093

spring:
  redis:
    host: localhost
    port: 6379
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

dubbo:
  application:
    name: drone-rank-service
  registry:
    address: zookeeper://localhost:2181
  protocol:
    name: dubbo
    port: -1
  provider:
    timeout: 5000
